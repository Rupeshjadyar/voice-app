// ==================== NAVIGATION ====================
function navigate(page) {
    state.currentPage = page;
    const app = document.getElementById('app-content');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    const pages = { home: renderHome, voices: renderVoices, blog: renderBlog, contact: renderContact, about: renderAbout, terms: renderTerms, privacy: renderPrivacy };
    app.innerHTML = (pages[page] || renderHome)();

    // Update active nav
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
    const activeBtn = document.getElementById(`nav-${page}`);
    if (activeBtn) activeBtn.classList.add('nav-active');

    if (page === 'home') loadStats();
}

function toggleMobileMenu() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
}

// ==================== TEXT INPUT ====================
function onTextInput(el) {
    const count = el.value.length;
    const ce = document.getElementById('char-count');
    const te = document.getElementById('time-estimate');
    if (ce) ce.textContent = count;
    if (te) te.textContent = Math.ceil(count / 15);
    // Warn at limit
    if (count > 5000) el.value = el.value.substring(0, 5000);
}

function onLangChange() {
    // Language changed - could update voice options based on lang

}

// ==================== CONVERT ====================
async function handleConvert() {
    const text = document.getElementById('tts-text')?.value.trim();
    if (!text) { showToast('Please enter some text first!', 'error'); return; }
    if (text.length > 5000) { showToast('Text too long! Max 5000 characters.', 'error'); return; }

    const btn    = document.getElementById('generate-btn');
    const btnTxt = document.getElementById('btn-text');
    const result = document.getElementById('result-area');

    btn.disabled = true;
    btnTxt.innerHTML = '<div class="loader"></div>';
    result.classList.add('hidden');

    const lang      = document.getElementById('tts-lang').value;
    const voiceType = document.getElementById('tts-voice').value;
    const rate      = document.getElementById('tts-rate').value;
    const pitch     = document.getElementById('tts-pitch').value;
    const volume    = document.getElementById('tts-volume').value;
    const style     = document.getElementById('tts-style').value;
    const emotion   = document.getElementById('tts-emotion').value;
    const format    = document.getElementById('tts-format').value;

    const fd = new FormData();
    fd.append('text', text);
    fd.append('language', lang);
    fd.append('voice_type', voiceType);
    fd.append('rate', rate);
    fd.append('pitch', pitch);
    fd.append('volume', volume);
    fd.append('style', style);
    fd.append('emotion', emotion);
    fd.append('format', format);
    fd.append('response_type', 'base64');

    try {
        const res  = await fetch('/convert', { method: 'POST', body: fd });
        const data = await res.json();

        if (data.success) {
            state.total++;
            state.today++;
            document.getElementById('stat-total') && (document.getElementById('stat-total').textContent = formatNumber(state.total));
            document.getElementById('stat-today') && (document.getElementById('stat-today').textContent = formatNumber(state.today));

            state.lastAudioData = data.audio_data;
            state.lastFilename  = data.filename;

            document.getElementById('audio-player').src = data.audio_data;
            document.getElementById('generation-info').textContent =
                `${data.method} · Voice: ${data.voice_used || 'N/A'} · ${lang}`;

            result.classList.remove('hidden');
            showToast('Audio generated successfully! 🎉');
        } else {
            showToast(data.error || 'Generation failed. Try again.', 'error');
        }
    } catch (e) {
        showToast('Network error. Please try again.', 'error');
        console.error(e);
    } finally {
        btn.disabled = false;
        btnTxt.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>Generate Voice';
    }
}

function regenerateAudio() { handleConvert(); }

// ==================== DOWNLOAD ====================
function downloadAudio() {
    if (!state.lastAudioData) { showToast('No audio to download yet.', 'error'); return; }
    const a = document.createElement('a');
    a.href = state.lastAudioData;
    a.download = state.lastFilename || `voicepro_${Date.now()}.mp3`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('Download started!');
}

// ==================== PREVIEW VOICE ====================
async function previewVoice(lang, voiceType, el) {
    if (el) {
        document.querySelectorAll('.voice-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    }

    showToast(`Loading ${lang} preview...`);

    try {
        const res  = await fetch('/preview-voice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ language: lang, voice_type: voiceType })
        });
        const data = await res.json();

        if (data.success) {
            const audio = new Audio(data.audio_data);
            audio.play();
            showToast(`Playing: ${lang} - ${voiceType}`);
        } else {
            showToast(data.error || 'Preview not available', 'error');
        }
    } catch (e) {
        showToast('Preview failed. Try again.', 'error');
        console.error(e);
    }
}

// ==================== STATS ====================
async function loadStats() {
    try {
        const res  = await fetch('/stats');
        const data = await res.json();
        state.total = data.total || 1540;
        state.today = data.today || 0;
        const t = document.getElementById('stat-total');
        const d = document.getElementById('stat-today');
        if (t) t.textContent = formatNumber(state.total);
        if (d) d.textContent = formatNumber(state.today);
    } catch (e) {
        state.total = 1540;
        state.today = 0;
    }
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => navigate('home'));
